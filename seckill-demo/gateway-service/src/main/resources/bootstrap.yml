spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:localhost:8848}
      username: nacos
      password: nacos
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: SEKILL_GROUP
        file-extension: yaml
        refresh-enabled: true
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: SEKILL_GROUP
