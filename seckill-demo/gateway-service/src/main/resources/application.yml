server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: SEKILL_GROUP
        enabled: true
        register-enabled: true
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: SEKILL_GROUP
        file-extension: yaml
        enabled: true
        refresh-enabled: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: seckill-service
          uri: lb://seckill-service
          predicates:
            - Path=/api/seckill/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
            - name: CircuitBreaker
              args:
                name: seckillCircuitBreaker
                fallbackUri: forward:/fallback/seckill
        - id: payment-service
          uri: lb://seckill-service
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
        - id: stock-service
          uri: lb://seckill-service
          predicates:
            - Path=/api/stock/**
          filters:
            - StripPrefix=1
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 200
            redis-rate-limiter.burstCapacity: 400
        - DedupeResponseHeader=Access-Control-Allow-Origin, Access-Control-Allow-CREDENTIALS

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 3000

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      seckillCircuitBreaker:
        baseConfig: default
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      paymentCircuitBreaker:
        baseConfig: default
        slidingWindowSize: 8
        failureRateThreshold: 60
        waitDurationInOpenState: 15s
      stockCircuitBreaker:
        baseConfig: default
        slidingWindowSize: 12
        failureRateThreshold: 40
        waitDurationInOpenState: 8s
  ratelimiter:
    configs:
      default:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0
        eventConsumerBufferSize: 10
    instances:
      seckillRateLimiter:
        baseConfig: default
        limitForPeriod: 100
        limitRefreshPeriod: 1s
      paymentRateLimiter:
        baseConfig: default
        limitForPeriod: 50
        limitRefreshPeriod: 1s
      stockRateLimiter:
        baseConfig: default
        limitForPeriod: 200
        limitRefreshPeriod: 1s
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    instances:
      defaultRetry:
        baseConfig: default
      seckillRetry:
        baseConfig: default
        maxAttempts: 2
      paymentRetry:
        baseConfig: default
        maxAttempts: 3

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.alibaba.nacos.discovery: DEBUG
    io.github.resilience4j: DEBUG

nacos:
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
