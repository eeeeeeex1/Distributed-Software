upstream seckill_backend {
    server seckill-service:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;
    charset utf-8;

    access_log /var/log/nginx/seckill_access.log;
    error_log /var/log/nginx/seckill_error.log;

    location ~* \.(html|css|js|png|jpg|ico|gif|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /api/ {
        proxy_pass http://seckill_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
