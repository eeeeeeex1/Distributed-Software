<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 秒杀商城</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <h1>秒杀商城</h1>
        </div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="products.html">商品列表</a>
            <a href="search.html">搜索商品</a>
        </div>
        <div class="nav-auth">
            <a href="login.html" class="btn btn-primary">登录</a>
            <a href="register.html" class="btn btn-secondary">注册</a>
        </div>
    </nav>

    <!-- 注册表单 -->
    <main class="auth-container">
        <div class="auth-box">
            <h2>用户注册</h2>
            <form id="register-form" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="请输入用户名（3-20个字符）" minlength="3" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="请输入密码（至少6个字符）" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">确认密码</label>
                    <input type="password" id="confirm-password" name="confirm-password" required 
                           placeholder="请再次输入密码" minlength="6">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block">注册</button>
                </div>
                <div class="form-links">
                    <span>已有账号？</span>
                    <a href="login.html">立即登录</a>
                </div>
            </form>
            <div id="message" class="message"></div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2026 高并发秒杀系统. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
