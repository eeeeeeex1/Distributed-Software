<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索商品 - 秒杀商城</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <h1>秒杀商城</h1>
        </div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="products.html">商品列表</a>
            <a href="search.html" class="active">搜索商品</a>
        </div>
        <div class="nav-auth">
            <span id="user-info" style="display: none;">
                欢迎，<span id="username"></span>
                <button onclick="logout()">退出</button>
            </span>
            <span id="auth-buttons">
                <a href="login.html" class="btn btn-primary">登录</a>
                <a href="register.html" class="btn btn-secondary">注册</a>
            </span>
        </div>
    </nav>

    <!-- 搜索区域 -->
    <main class="main-container">
        <section class="search-section">
            <h2 class="section-title">商品搜索</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="请输入商品名称或描述..." 
                       onkeypress="if(event.key==='Enter') searchProducts()">
                <button onclick="searchProducts()" class="btn btn-primary">搜索</button>
                <button onclick="syncToEs()" class="btn btn-secondary">同步数据</button>
            </div>
            <div id="search-message" class="message"></div>
        </section>

        <!-- 搜索结果 -->
        <section class="section">
            <div class="product-grid" id="search-results">
                <!-- 搜索结果将通过JS动态加载 -->
            </div>
            <div class="loading" id="loading" style="display: none;">搜索中...</div>
            <div class="pagination" id="pagination">
                <!-- 分页将通过JS动态生成 -->
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2026 高并发秒杀系统. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // 页面加载时检查登录状态
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
        });
    </script>
</body>
</html>
