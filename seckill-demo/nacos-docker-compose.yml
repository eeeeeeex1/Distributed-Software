version: '3.8'

services:
  # Nacos 服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos-server
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=embedded
      - PREFER_HOST_MODE=hostname
      - NACOS_SERVER_PORT=8848
      - NACOS_DEBUG_ENABLE=true
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/data:/home/nacos/data
    restart: unless-stopped
    networks:
      - seckill-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sentinel 流量控制服务（备用流量治理方案）
  sentinel:
    image: bladex/sentinel-dashboard:latest
    container_name: sentinel-dashboard
    environment:
      - JAVA_OPTS=-Dserver.port=8858 -Dcsp.sentinel.dashboard.server=localhost:8858 -Dproject.name=sentinel-dashboard
    ports:
      - "8858:8858"
    restart: unless-stopped
    networks:
      - seckill-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8858"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  seckill-network:
    driver: bridge
