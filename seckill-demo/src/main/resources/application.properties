# 数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3307/seckill?useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis 配置
mybatis.type-aliases-package=com.example.seckill_demo.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath:mybatis/*.xml

# 服务端口
server.port=8080

logging.level.org.springframework.boot.web.embedded.tomcat=DEBUG
logging.level.org.springframework.context=DEBUG


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always