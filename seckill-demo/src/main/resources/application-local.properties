# 本地开发环境配置
# 使用本地MySQL（单库模式，不使用主从）
spring.datasource.url=jdbc:mysql://localhost:3306/seckill?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis.type-aliases-package=com.example.seckill_demo.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 服务端口
server.port=8080

# 日志配置
logging.level.org.springframework.jdbc.datasource=INFO
logging.level.com.example.seckill_demo=INFO
logging.level.root=INFO

# Redis配置（本地）
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0

# ElasticSearch配置（可选，本地开发可以禁用）
# spring.elasticsearch.uris=http://localhost:9200

# 禁用ES自动配置（如果没有安装ES）
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.actuate.autoconfigure.jdbc.DataSourcePoolMetricsAutoConfiguration

# 允许Bean定义覆盖
spring.main.allow-bean-definition-overriding=true

# 监控配置
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always